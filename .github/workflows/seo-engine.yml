# G Squared SEO/AEO/GEO Engine — manual trigger only.
#
# The DAILY publish runs on Greg's machine via the Windows scheduled task
# `SEOEngineDaily` (7:05 AM, entry point _BACKUPS/seo_engine_daily_run.bat in
# the Git Test Folder repo), which reads the local .env so no GitHub secret is
# needed. The cloud cron was removed 2026-07-14 to prevent double publishing.
#
# This workflow remains as a manual fallback: Actions tab → SEO Engine →
# Run workflow. For it to succeed, the GEMINI_API_KEY repo secret must exist
# (optional: GMAIL_ADDRESS, GMAIL_APP_PASSWORD, EMAIL_RECIPIENT).

name: SEO Engine

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: seo-engine
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish next article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python seo_run.py

      - name: Commit and push new content
        run: |
          git config user.name "seo-engine-bot"
          git config user.email "actions@github.com"
          git add -A content/ docs/
          if [ -f .saved_posts.json ]; then git add .saved_posts.json; fi
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "SEO engine: publish daily article ($(date -u +%Y-%m-%d))"
            git push
          fi
